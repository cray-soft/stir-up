<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Stir Up — Add to Home Screen</title>
    <meta name="description" content="How to install Stir Up on your phone's home screen." />
    <meta name="theme-color" content="#1E293B" />
    <link rel="icon" href="images/icon.png" />
    <link rel="apple-touch-icon" href="images/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen">
      <!-- STEP 1: language picker -->
      <section id="lang-screen" class="step is-active">
        <div class="hero">
          <div class="flame">🔥</div>
          <h1 class="title">STIR UP</h1>
          <p class="subtitle" data-i18n-static>Choose your language · Elige tu idioma</p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" data-lang="en">ENGLISH</button>
          <button class="btn btn-dark" data-lang="es">ESPAÑOL</button>
        </div>
      </section>

      <!-- STEP 1b: 18+ age gate -->
      <section id="age-screen" class="step">
        <div class="hero">
          <div class="flame">🔥</div>
          <h1 class="title title-sm" data-i18n="ageTitle"></h1>
          <p class="teaser" data-i18n="ageBody"></p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="age-confirm" data-i18n="ageConfirm"></button>
          <button class="btn btn-dark" id="age-deny" data-i18n="ageDeny"></button>
        </div>
        <p class="age-blocked" id="age-blocked" data-i18n="ageBlocked" hidden></p>
        <button class="link-back" data-back="lang" data-i18n="changeLang"></button>
      </section>

      <!-- STEP 2: teaser + platform pick -->
      <section id="teaser-screen" class="step">
        <div class="hero">
          <div class="flame">🔥</div>
          <h1 class="title">STIR UP</h1>
          <p class="tagline" data-i18n="tagline"></p>
        </div>
        <p class="teaser" data-i18n="teaser"></p>
        <div class="levels">
          <span class="chip chip-warm" data-i18n="levelWarm"></span>
          <span class="chip chip-hot" data-i18n="levelHot"></span>
          <span class="chip chip-fire" data-i18n="levelFire"></span>
        </div>
        <h2 class="section-label" data-i18n="installHeading"></h2>
        <div class="actions">
          <button class="btn btn-dark btn-icon" data-platform="ios">
            <svg class="os-icon" viewBox="0 0 384 512" aria-hidden="true">
              <path
                fill="currentColor"
                d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"
              />
            </svg>
            <span data-i18n="iosButton"></span>
          </button>
          <button class="btn btn-green btn-icon" data-platform="android">
            <svg class="os-icon" viewBox="0 0 576 512" aria-hidden="true">
              <path
                fill="currentColor"
                d="M420.6 301.9a24 24 0 1 1 24-24 24 24 0 0 1-24 24m-265.1 0a24 24 0 1 1 24-24 24 24 0 0 1-24 24m273.7-144.5 47.9-83a10 10 0 1 0-17.3-10h0l-48.5 84.1a301.3 301.3 0 0 0-246.6 0L116.2 64.5a10 10 0 1 0-17.3 10h0l47.9 83C64.5 202.2 8.2 285.6 0 384h576c-8.2-98.5-64.5-181.8-146.9-226.6"
              />
            </svg>
            <span data-i18n="androidButton"></span>
          </button>
        </div>
        <a class="btn btn-primary app-link" id="app-link" href="#" target="_blank" rel="noopener">
          <span data-i18n="openApp"></span>
        </a>
        <button class="link-back" data-back="lang" data-i18n="changeLang"></button>
      </section>

      <!-- STEP 3: instructions image -->
      <section id="instructions-screen" class="step">
        <div class="instructions-frame">
          <img id="instructions-img" alt="" />
        </div>
        <button class="btn btn-dark" data-back="teaser" data-i18n="backButton"></button>
      </section>
    </main>

    <footer class="footer">
      <span class="flame-sm">🔥</span> Stir Up · 18+
    </footer>

    <script src="app.js"></script>
  </body>
</html>
